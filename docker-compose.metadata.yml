services:
  metadata-mysql:
    image: ${METADATA_MYSQL_IMAGE:-mysql:8.0}
    container_name: ${METADATA_MYSQL_CONTAINER_NAME:-tencent-sync-metadata-mysql}
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${METADATA_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${METADATA_MYSQL_DATABASE:-tencent_sheets_sync}
    ports:
      - "${METADATA_MYSQL_PORT:-13306}:3306"
    volumes:
      - metadata_mysql_data:/var/lib/mysql

volumes:
  metadata_mysql_data:
